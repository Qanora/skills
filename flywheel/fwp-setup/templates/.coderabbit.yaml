language: zh-CN
reviews:
  profile: chill
  request_changes_workflow: true
  high_level_summary: true
  path_filters:
    - "!**/*.md"
  instructions: |
    请进行彻底审查，重点关注：正确性、安全性、错误处理、边界情况。
    完全忽略所有格式化问题（缩进、空格、括号换行）。
    不要针对变量命名风格提出建议，除非涉及严重的逻辑歧义。
    只有在发现实质性问题或严重隐患时才进行评论，避免琐碎的表层建议。
  auto_review:
    enabled: true
    auto_pause_after_reviewed_commits: 10
